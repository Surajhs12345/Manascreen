<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- Basic -->
    <title>ManaScreen — Mental Wellness Check-in</title>
    <meta name="description" content="A private mental wellness screening tool. DSM-5 aligned, clinically validated, completely private. Built by a doctor in India." />

    <!-- Icons & manifest -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme -->
    <meta name="theme-color" content="#fdf8f4" />

    <!-- iOS / Apple -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ManaScreen" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png" />

    <!-- Microsoft -->
    <meta name="msapplication-TileColor" content="#e8845a" />

    <!-- Social / Open Graph -->
    <meta property="og:title" content="ManaScreen — Mental Wellness Check-in" />
    <meta property="og:description" content="A private mental wellness screening tool. Clinically validated, completely private. Built by a doctor in India." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://manascreen.vercel.app" />

    <!-- Privacy -->
    <meta name="referrer" content="no-referrer" />
    <meta name="robots" content="index, follow" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
