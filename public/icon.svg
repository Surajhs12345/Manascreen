<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Rounded background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf8f4"/>
      <stop offset="100%" stop-color="#fdeee6"/>
    </linearGradient>
    <linearGradient id="petal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4a87a"/>
      <stop offset="100%" stop-color="#e8845a"/>
    </linearGradient>
    <radialGradient id="center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd89a"/>
      <stop offset="100%" stop-color="#d4972a"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Soft ring behind flower -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#e8845a" stroke-width="2" opacity="0.15"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="#6b9e82" stroke-width="2" opacity="0.12"/>

  <!-- 5-petal flower -->
  <g transform="translate(256 256)">
    <!-- Petal 1 (top) -->
    <ellipse cx="0" cy="-95" rx="58" ry="82" fill="url(#petal)" opacity="0.92" transform="rotate(0)"/>
    <!-- Petal 2 -->
    <ellipse cx="0" cy="-95" rx="58" ry="82" fill="url(#petal)" opacity="0.92" transform="rotate(72)"/>
    <!-- Petal 3 -->
    <ellipse cx="0" cy="-95" rx="58" ry="82" fill="url(#petal)" opacity="0.92" transform="rotate(144)"/>
    <!-- Petal 4 -->
    <ellipse cx="0" cy="-95" rx="58" ry="82" fill="url(#petal)" opacity="0.92" transform="rotate(216)"/>
    <!-- Petal 5 -->
    <ellipse cx="0" cy="-95" rx="58" ry="82" fill="url(#petal)" opacity="0.92" transform="rotate(288)"/>

    <!-- Center -->
    <circle cx="0" cy="0" r="44" fill="url(#center)"/>
    <circle cx="0" cy="0" r="30" fill="#d4972a" opacity="0.35"/>
  </g>
</svg>
